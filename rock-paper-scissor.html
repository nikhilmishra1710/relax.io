
<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Rock, Paper, Scissors!</title>
    <meta name="author" content="Tom McErlean">
    <meta name="description" content="A simple game of rock, paper, scissors.">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="./rock-paper-scissor/style.css" rel="stylesheet">

</head>

<body>
    <audio id="startbuttonsound" src="./rock-paper-scissor/sounds/zapsplat_multimedia_button_click_005_53866.mp3"></audio>
    <audio id="winnersound" src="./rock-paper-scissor/sounds/Cheering-SoundBible.com-1115515042.wav"></audio>
    <audio id="losersound" src="./rock-paper-scissor/sounds/Sad-SoundBible.com-759843766.wav"></audio>
    <div class="container" id="startcontainer">
        <button id="startbutton">Start Game</button>
        <div class="home">
            <button class="homebutton"><a href="start.html"><img src="tic-tac-toe/home.svg" alt="home icon" height="60px" width="40px"></a></button>
        </div>
    </div>
    <script src="./rock-paper-scissor/main.js"></script>
    <div class="container" id="endcontainer">
        <div class="topcontainer">
            <h1 id="gameh1"></h1>
        </div>
        <div class="gamecontainer">
            <div class="playercontainer">
                <h1 class="playerh1">Player</h1>
                <div class="playerinformation">
                    <div class="playerlogo">
                        <img class="logo" src="./rock-paper-scissor/images/user.png">
                    </div>
                    <div class="playerscore">
                        <p class="score" id="playerscore">Score: 0</p>
                    </div>
                </div>
                <div class="gameselections">
                    <div class="gameselection" id="rockdiv">
                        <p class="gameselectiontext" id="rockselection">Rock</p>
                        <img class="selection" id ="rockimg" src="./rock-paper-scissor/images/rock.png">
                    </div>
                    <div class="gameselection" id="paperdiv">
                        <p class="gameselectiontext" id="paperselection">Paper</p>
                        <img class="selection" id="paperimg" src="./rock-paper-scissor/images/paper.png">
                    </div>
                    <div class="gameselection" id="scissorsdiv">
                        <p class="gameselectiontext" id="scissorsselection">Scissors</p>
                        <img class="selection" id="scissorsimg" src="./rock-paper-scissor/images/scissors.png">
                    </div>
                </div>
            </div>
            <div class="playercontainer">
                <h1 class="playerh1">Computer</h1>
                <div class="playerinformation">
                    <div class="playerlogo">
                        <img class="logo" src="./rock-paper-scissor/images/robot.png">
                    </div>
                    <div class="playerscore">
                        <p class="score" id="computerscore">Score: 0</p>
                    </div>
                </div>
                <div class="gameselections">
                    <div class="gameselection" id="computerrockdiv">
                        <p class="gameselectiontext">Rock</p>
                        <img class="selection" src="./rock-paper-scissor/images/rock.png">
                    </div>
                    <div class="gameselection" id="computerpaperdiv">
                        <p class="gameselectiontext">Paper</p>
                        <img class="selection" src="./rock-paper-scissor/images/paper.png">
                    </div>
                    <div class="gameselection" id="computerscissorsdiv">
                        <p class="gameselectiontext">Scissors</p>
                        <img class="selection" src="./rock-paper-scissor/images/scissors.png">
                    </div>
                </div>
            </div>
        </div>
        <div class="bottomcontainer" id="bottomcontainer">
            <div class="winninglogodiv">
                <img class="winninglogo" id="userwinslogo" src="./rock-paper-scissor/images/user.png">
                <img class="winninglogo" id="robotwinslogo" src="./rock-paper-scissor/images/robot.png">
            </div>
            <p class="gameupdates"></p>
            <a onclick="submit()" id="endbutton">Play Again?</button>
        </div>
    </div>
    <form style="display: none;" id="form_score" action="rps_score.php" method="post">
        <input type="text" name="winner" id="winner">
    </form>
    <script>
        function submit(){
            document.getElementById("form_score").submit()
        }
    </script>
</body>
</html>
