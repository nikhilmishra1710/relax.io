<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tic-tac-toe</title>
    <link rel="stylesheet" href="./tic-tac-toe/style.css">
    <script src="./tic-tac-toe/script.js" defer></script>
</head>
<body>
    <div class="container first" id="container2">
        <div class="welcome">
            <img src="./tic-tac-toe/images-removebg-preview (2).png" alt="welcome_text">
        </div>
        <div class="choosetext">
            <h1> 🅲🅷🅾🅾🆂🅴 🆃🆄🆁🅽</h1>
        </div>
        <div class="chooseturn">
        <div class="cross" id="choicecross"><img src="./tic-tac-toe/cancel.png" alt="cancel sign" height="50px" width="50px"></div>
        <div class="circle" id="choiceo"><img src="./tic-tac-toe/ci.png" alt="cross sign" height="50px" width="50px"></div>
    </div></div>
    <div class="container second" id="container">
        <div class="board " id="board">
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>
            <div class="cell" data-cell></div>


        </div>
        <div class="home">
            <button class="homebutton"><a href="start.html"><img src="tic-tac-toe/home.svg" alt="home icon" height="60px" width="40px"></a></button>
        </div>
        

    
        <div class="winning-message " id="winning-message-text">
            <div class="pataka"><img src="./tic-tac-toe/pataka.gif"><img src="./tic-tac-toe/pataka.gif"></div>
            <div data-winning-message></div>
            <button id="restart-button"> Restart</button>
            <div class="pataka"><img src="./tic-tac-toe/pataka.gif"><img src="./tic-tac-toe/pataka.gif"></div>
        </div>
    </div>
    
    
</body>
</html>
